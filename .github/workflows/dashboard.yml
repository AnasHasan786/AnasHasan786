name: Update GitHub Analytics Dashboard

on:
  schedule:
    # Runs every night at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "templates/**"
      - ".github/workflows/dashboard.yml"

permissions:
  contents: write

concurrency:
  group: dashboard-update
  cancel-in-progress: true

jobs:
  build-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate dashboard SVGs
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_USERNAME: AnasHasan786
        run: python scripts/dashboard.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet --exit-code -- assets/dashboard; then
            echo "No changes to the dashboard — nothing to commit."
            exit 0
          fi

          git add assets/dashboard/*.svg
          git commit -m "chore: auto-update analytics dashboard [skip ci]"
          git push
